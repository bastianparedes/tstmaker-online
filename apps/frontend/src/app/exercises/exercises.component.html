@if (exercises !== undefined) {
  <table class="text-left">
    <thead>
      <tr>
        <th class="p-5">ID</th>
        <th class="p-5">Name</th>
        <th class="p-5">Description</th>
        <th class="p-5">Date</th>
        <th class="p-5">Code</th>
      </tr>
    </thead>
    <tbody>
      @for (exercise of exercises; track $index) {
        <tr>
          <td class="p-5"><span>{{ exercise.id }}</span></td>
          <td class="p-5"><span> {{ exercise.name }}</span></td>
          <td class="p-5"><span>{{ exercise.description }}</span></td>
          <td class="p-5">
            <span>{{ exercise.last_modified_date }}</span>
          </td>
          <td class="p-5"><button type="text" (click)="openCode(exercise.id)">Edit code</button></td>
        </tr>
      }
    </tbody>
  </table>
}
