<div class="table w-full">
  @if (exercises !== undefined) {
    @for (exercise of exercises; track $index) {
      <app-exercise class="table-row" [id]="exercise.id" [name]="exercise.name" [description]="exercise.description" [last_modified_date]="exercise.last_modified_date" [code]="exercise.code" />
    }
  }
</div>
