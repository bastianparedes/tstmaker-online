<form class="table-row" method="post" (submit)="handleSubmit($event)">
  <span class="table-cell ml-10">{{ id }}</span>
  <input class="table-cell ml-10" type="text" value="{{ name }}"/>
  @if (date !== undefined) {
    <span class="table-cell ml-10">{{ date }}</span>
  }
  <button class="table-cell ml-10" type="text">Edit code</button>
</form>
